name: Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Installer version
        required: true
        default: 0.1.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "${{ inputs.version }}"
          }

          "CROSSLAY_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "Resolved installer version: $version"

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish .\CrosshairMarker.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:Version=$env:CROSSLAY_VERSION `
            -p:AssemblyVersion=$env:CROSSLAY_VERSION.0 `
            -p:FileVersion=$env:CROSSLAY_VERSION.0 `
            --output .\artifacts\publish

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" .\installer\Crosslay.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Crosslay-Setup-${{ env.CROSSLAY_VERSION }}
          path: artifacts/installer/*.exe

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $installer = Get-ChildItem .\artifacts\installer\*.exe | Select-Object -First 1

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $installer.FullName --clobber
          } else {
            gh release create $tag $installer.FullName --title "Crosslay $tag" --generate-notes
          }
