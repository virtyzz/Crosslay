name: Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Installer version
        required: true
        default: 0.1.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "${{ inputs.version }}"
          }

          "CROSSLAY_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "Resolved installer version: $version"

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish .\CrosshairMarker.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:Version=$env:CROSSLAY_VERSION `
            -p:AssemblyVersion=$env:CROSSLAY_VERSION.0 `
            -p:FileVersion=$env:CROSSLAY_VERSION.0 `
            --output .\artifacts\publish

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" .\installer\Crosslay.iss

      - name: Build release notes
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $previousTag = git describe --tags --abbrev=0 "$tag^" 2>$null
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($previousTag)) {
            $range = $tag
            $compareUrl = ""
          } else {
            $range = "$previousTag..$tag"
            $compareUrl = "https://github.com/${{ github.repository }}/compare/$previousTag...$tag"
          }

          $commits = git log $range --pretty=format:"%s"
          $added = New-Object System.Collections.Generic.List[string]
          $fixed = New-Object System.Collections.Generic.List[string]
          $changed = New-Object System.Collections.Generic.List[string]

          foreach ($commit in $commits) {
            $text = ($commit -replace '^\s*(feat|fix|chore|docs|style|refactor|perf|test|build|ci)(\([^)]+\))?!?:\s*', '').Trim()
            if ([string]::IsNullOrWhiteSpace($text)) {
              continue
            }

            $item = "- " + $text.Substring(0, 1).ToUpperInvariant() + $text.Substring(1)
            if ($commit -match '^\s*(feat)(\([^)]+\))?!?:') {
              $added.Add($item)
            } elseif ($commit -match '^\s*(fix|perf)(\([^)]+\))?!?:') {
              $fixed.Add($item)
            } else {
              $changed.Add($item)
            }
          }

          $notes = New-Object System.Collections.Generic.List[string]
          $notes.Add("## Что изменилось")
          if ($added.Count -gt 0) {
            $notes.Add("")
            $notes.Add("### Добавлено")
            $notes.AddRange($added)
          }
          if ($fixed.Count -gt 0) {
            $notes.Add("")
            $notes.Add("### Исправлено")
            $notes.AddRange($fixed)
          }
          if ($changed.Count -gt 0) {
            $notes.Add("")
            $notes.Add("### Изменено")
            $notes.AddRange($changed)
          }
          if ($added.Count + $fixed.Count + $changed.Count -eq 0) {
            $notes.Add("")
            $notes.Add("- Исправления и улучшения стабильности.")
          }
          if ($compareUrl) {
            $notes.Add("")
            $notes.Add("[Полный список изменений]($compareUrl)")
          }

          $notes | Set-Content -Path .\artifacts\release_notes.md -Encoding UTF8

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Crosslay-Setup-${{ env.CROSSLAY_VERSION }}
          path: artifacts/installer/*.exe

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $installer = Get-ChildItem .\artifacts\installer\*.exe | Select-Object -First 1

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $installer.FullName --clobber
            gh release edit $tag --notes-file .\artifacts\release_notes.md
          } else {
            gh release create $tag $installer.FullName --title "Crosslay $tag" --notes-file .\artifacts\release_notes.md
          }
